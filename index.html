<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Bliss | Premium Coffee Experience</title>
  <meta name="description"
    content="Discover the finest premium coffee beans from around the world. Ethiopian Yirgacheffe, Colombian Supremo, Sumatra Mandheling and more." />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Google Fonts: preconnect + preload for faster font loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" />
  </noscript>

  <!-- Critical inline CSS for instant first paint -->
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }

    /* Instant background color to avoid white flash */
    .bg-amber-50 {
      background-color: #fffbeb;
    }

    .text-\[#4B2E0E\] {
      color: #4B2E0E;
    }

    /* Loading skeleton for #root while JS loads */
    #root:empty {
      min-height: 100vh;
      background-color: #fffbeb;
    }

    #root:empty::after {
      content: '';
      display: block;
      height: 88px;
      background-color: #4B2E0E;
    }
  </style>

</head>

<body class="bg-amber-50 text-[#4B2E0E]">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
