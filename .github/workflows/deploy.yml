name: Deploy Vite to GitHub Pages

on:
  push:
    branches:
      - master

# 🔴 WAJIB ADA DI LEVEL ROOT
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build
        env:
          VITE_API_URL: https://script.google.com/macros/s/AKfycbyX8rQE-2IUmXiP97dnmq11EdTXJ-xLYHreT7KrWVwpCvlHWhub4AEKYZ_CmREQFHyM8A/exec
          VITE_GOOGLE_CLIENT_ID: 352132989417-ae3rjrulhqnleffo1ukk1o5en7poii75.apps.googleusercontent.com

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
